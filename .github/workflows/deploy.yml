name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            git config --global --add safe.directory /home/mohamed/backend
            cd /home/mohamed/backend/api
            git fetch origin main
            git reset --hard origin/main
            
            docker-compose down
            docker-compose build --no-cache api
            docker-compose up -d
            docker image prune -f
